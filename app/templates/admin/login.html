<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Portal Grobogan</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="font-sans bg-slate-100 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-xl">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-bold text-slate-900">Portal Grobogan</h1>
            <p class="text-slate-500 mt-2">Silakan login untuk mengelola konten</p>
        </div>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="mb-6 p-4 rounded-lg flex items-center gap-3 {% if category == 'error' %}bg-red-50 text-red-800 border border-red-200{% else %}bg-blue-50 text-blue-800 border border-blue-200{% endif %}">
                <i data-lucide="{% if category == 'error' %}alert-circle{% else %}info{% endif %}" class="w-5 h-5"></i>
                <span class="text-sm font-medium">{{ message }}</span>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('admin.login') }}" method="POST" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input type="email" name="email" id="email" required
                       class="w-full px-4 py-3 bg-white border border-slate-200 rounded-lg shadow-sm focus:ring-primary focus:border-primary placeholder:text-slate-400"
                       placeholder="nama@email.com">
            </div>

            <div>
                <div class="flex items-center justify-between mb-1">
                    <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                    <a href="#" class="text-xs text-primary hover:underline">Lupa password?</a>
                </div>
                <input type="password" name="password" id="password" required
                       class="w-full px-4 py-3 bg-white border border-slate-200 rounded-lg shadow-sm focus:ring-primary focus:border-primary placeholder:text-slate-400"
                       placeholder="••••••••">
            </div>

            <div class="flex items-center">
                <input type="checkbox" id="remember" class="w-4 h-4 text-primary border-slate-300 rounded focus:ring-primary">
                <label for="remember" class="ml-2 block text-sm text-slate-600">Ingat saya</label>
            </div>

            <button type="submit" 
                    class="w-full bg-slate-900 hover:bg-slate-800 text-white font-semibold py-3 px-4 rounded-lg shadow-lg shadow-slate-200 transition-all active:scale-[0.98]">
                Masuk ke Dashboard
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-slate-100 text-center">
            <a href="{{ url_for('public.index') }}" class="text-sm text-slate-500 hover:text-primary inline-flex items-center gap-2">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Kembali ke Beranda
            </a>
        </div>
    </div>

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>

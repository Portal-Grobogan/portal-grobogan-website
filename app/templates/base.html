<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portal Resmi Kabupaten Grobogan - Layanan Publik, Berita Terkini, dan Informasi Daerah.">
  <title>{% block title %}Portal Grobogan{% endblock %}</title>
  
  <!-- Font Support -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}?v=1.2">
  
  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="//unpkg.com/alpinejs" defer></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  {% block head %}{% endblock %}
</head>
<body class="font-body bg-site-bg text-slate-700 antialiased">
  
  {% include 'components/navbar.html' %}

  <main class="min-h-screen">
    {% block content %}{% endblock %}
  </main>

  {% include 'components/footer.html' %}

  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
    // Re-initialize icons after Alpine.js or HTMX updates if needed
    document.addEventListener('alpine:initialized', () => {
      lucide.createIcons();
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>

{% macro render_berita(item) %}
<article class="flex flex-col bg-white rounded-2xl border border-slate-100 overflow-hidden hover:shadow-2xl hover:-translate-y-1 transition-all duration-500 group">
  <div class="relative h-48 overflow-hidden bg-slate-100">
    <img src="{{ item.thumbnail_url or 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&q=80&w=800' }}" 
         alt="{{ item.judul }}"
         class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
    <div class="absolute top-4 left-4">
      <span class="px-3 py-1 bg-white/95 backdrop-blur-sm text-primary text-[10px] font-bold uppercase tracking-wider rounded-lg shadow-sm">
        {{ item.kategori }}
      </span>
    </div>
  </div>
  <div class="p-6 flex-grow flex flex-col">
    <div class="flex items-center text-[11px] font-semibold text-slate-400 mb-3 space-x-3 uppercase tracking-tight">
      <span class="flex items-center">
        <i data-lucide="calendar" class="w-3 h-3 mr-1.5 text-primary/60"></i>
        {{ item.created_at.strftime('%d %b %Y') if item.created_at else 'Baru' }}
      </span>
      <span class="flex items-center">
        <i data-lucide="clock" class="w-3 h-3 mr-1.5 text-primary/60"></i>
        5 mnt baca
      </span>
    </div>
    <h3 class="text-lg font-bold text-slate-900 group-hover:text-primary transition-colors line-clamp-2 mb-3 leading-snug">
      <a href="{{ url_for('public.berita_detail', slug=item.slug) }}">
        {{ item.judul }}
      </a>
    </h3>
    <p class="text-sm text-slate-500 line-clamp-2 mb-6 leading-relaxed">
      {{ item.ringkasan or item.konten|striptags|truncate(100) }}
    </p>
    <div class="mt-auto">
      <a href="{{ url_for('public.berita_detail', slug=item.slug) }}" 
         class="inline-flex items-center text-sm font-bold text-primary group-hover:gap-2 transition-all">
        Baca Selengkapnya
        <i data-lucide="chevron-right" class="w-4 h-4 mt-0.5"></i>
      </a>
    </div>
  </div>
</article>
{% endmacro %}

{% macro render_layanan(item) %}
<a href="{{ item.url_path or '#' }}" 
   class="group bg-white p-8 rounded-2xl border border-slate-100 hover:border-primary hover:shadow-xl transition-all duration-300 flex flex-col items-center text-center">
  <div class="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-white transition-all duration-300 mb-6 shadow-sm">
    <i data-lucide="{{ item.icon_name or 'box' }}" class="w-8 h-8"></i>
  </div>
  <h3 class="text-lg font-bold text-slate-900 group-hover:text-primary transition-colors mb-2">
    {{ item.nama }}
  </h3>
  <p class="text-sm text-slate-500 leading-relaxed">
    {{ item.deskripsi }}
  </p>
</a>
{% endmacro %}

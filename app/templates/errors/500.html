{% extends "base.html" %}
{% block title %}500 - Kesalahan Server Internal{% endblock %}

{% block content %}
<section class="min-h-[70vh] flex flex-col items-center justify-center p-8 bg-white">
    <div class="text-center animate-in fade-in slide-in-from-bottom-8 duration-700">
        <div class="relative inline-block mb-10">
            <i data-lucide="server-crash" class="w-32 h-32 text-red-50/50"></i>
            <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-8xl font-black text-red-100/30 tracking-tighter">500</span>
        </div>
        
        <h1 class="text-4xl font-black text-slate-900 mb-4">Ups, Terjadi Kesalahan!</h1>
        <p class="text-slate-500 text-lg max-w-md mx-auto mb-10 leading-relaxed">
            Tim teknis kami sedang menangani masalah ini. Silakan coba memuat ulang halaman dalam beberapa menit.
        </p>
        
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <button onclick="location.reload()" class="w-full sm:w-auto px-10 py-4 bg-primary text-white font-black rounded-2xl shadow-xl shadow-primary/20 hover:bg-primary-dark transition-all hover:-translate-y-1">
                Muat Ulang Halaman
            </button>
            <a href="{{ url_for('public.index') }}" class="w-full sm:w-auto px-10 py-4 bg-white text-slate-600 border border-slate-200 font-bold rounded-2xl hover:bg-slate-50 transition-all">
                Lapor Admin
            </a>
        </div>
    </div>
</section>
{% endblock %}

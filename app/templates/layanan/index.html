{% extends "base.html" %}
{% block title %}Layanan Publik | Portal Grobogan{% endblock %}

{% block content %}

<!-- HERO -->
<section class="bg-primary py-20 relative overflow-hidden">
    <div class="absolute inset-0 opacity-10 pointer-events-none">
        <svg class="h-full w-full" viewBox="0 0 100 100" preserveAspectRatio="none">
            <rect x="0" y="0" width="100" height="100" fill="currentColor"></rect>
        </svg>
    </div>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center">
        <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-6">Pusat Layanan Publik</h1>
        <p class="text-slate-200 text-lg max-w-2xl mx-auto">
            Temukan berbagai akses layanan resmi pemerintah Kabupaten Grobogan dalam satu platform terintegrasi.
        </p>
    </div>
</section>

<!-- MAIN -->
<section class="py-16 bg-slate-50"
    x-data="{
        search: '',
        category: 'semua',
        services: [
            {
                title: 'Administrasi Kependudukan',
                desc: 'Layanan pengurusan KTP, Kartu Keluarga, Akta Kelahiran, dan surat kependudukan lainnya.',
                category: 'administrasi',
                url: '{{ url_for('public.layanan_kependudukan') }}',
                icon: 'users',
                color: 'blue'
            },
            {
                title: 'Informasi Kesehatan',
                desc: 'Cek ketersediaan RS, jadwal PPDB sekolah, lokasi Puskesmas, dan informasi vaksinasi.',
                category: 'sosial',
                url: '{{ url_for('public.layanan_kesehatan') }}',
                icon: 'heart-pulse',
                color: 'red'
            },
            {
                title: 'Sistem Pantau Bencana',
                desc: 'Pantauan realtime situasi bencana, peta rawan wilayah, dan nomor darurat Kabupaten Grobogan.',
                category: 'sosial',
                url: '{{ url_for('public.layanan_kebencanaan') }}',
                icon: 'alert-triangle',
                color: 'orange'
            },
            {
                title: 'Jelajah Pariwisata',
                desc: 'Eksplorasi destinasi wisata alam, kuliner legendaris, dan kalender acara budaya di Grobogan.',
                category: 'ekonomi',
                url: '{{ url_for('public.layanan_pariwisata') }}',
                icon: 'map',
                color: 'emerald'
            }
        ],

        get filteredServices() {
            return this.services.filter(service => {
                const matchSearch = service.title.toLowerCase().includes(this.search.toLowerCase());
                const matchCategory = this.category === 'semua' || service.category === this.category;
                return matchSearch && matchCategory;
            });
        },

        init() {
            // render awal
            this.$nextTick(() => {
                if (window.lucide) lucide.createIcons();
            });

            // re-render setiap filter berubah
            this.$watch('filteredServices', () => {
                this.$nextTick(() => {
                    if (window.lucide) lucide.createIcons();
                });
            });
        }
    }">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

        <div class="flex flex-col lg:flex-row gap-12 -mt-24 relative z-20">

            <!-- SIDEBAR -->
            <aside class="lg:w-1/4">
                <div class="bg-white rounded-2xl shadow-xl p-6 border border-slate-100 sticky top-28">

                    <!-- SEARCH -->
                    <div class="mb-8">
                        <label class="block text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">
                            Pencarian
                        </label>
                        <div class="relative">
                            <input type="text" x-model="search" placeholder="Cari layanan..."
                                class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-primary focus:border-primary transition-all">
                            <i data-lucide="search"
                                class="absolute left-3.5 top-3.5 text-slate-400 w-4 h-4"></i>
                        </div>
                    </div>

                    <!-- CATEGORY -->
                    <nav class="space-y-2">
                        <label class="block text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">
                            Kategori
                        </label>

                        <button @click="category = 'semua'"
                            :class="category === 'semua' ? 'bg-primary text-white shadow-lg' : 'text-slate-600 hover:bg-slate-50'"
                            class="w-full px-4 py-3 rounded-xl font-bold text-left transition-all">
                            Semua Layanan
                        </button>

                        <button @click="category = 'administrasi'"
                            :class="category === 'administrasi' ? 'bg-primary text-white shadow-lg' : 'text-slate-600 hover:bg-slate-50'"
                            class="w-full px-4 py-3 rounded-xl font-bold text-left transition-all">
                            Administrasi
                        </button>

                        <button @click="category = 'sosial'"
                            :class="category === 'sosial' ? 'bg-primary text-white shadow-lg' : 'text-slate-600 hover:bg-slate-50'"
                            class="w-full px-4 py-3 rounded-xl font-bold text-left transition-all">
                            Sosial & Kesehatan
                        </button>

                        <button @click="category = 'ekonomi'"
                            :class="category === 'ekonomi' ? 'bg-primary text-white shadow-lg' : 'text-slate-600 hover:bg-slate-50'"
                            class="w-full px-4 py-3 rounded-xl font-bold text-left transition-all">
                            Ekonomi & Pariwisata
                        </button>
                    </nav>

                </div>
            </aside>

            <!-- SERVICES -->
            <main class="lg:w-3/4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <template x-for="service in filteredServices" :key="service.title">
                        <a :href="service.url"
                            class="group bg-white p-6 rounded-2xl border border-slate-100 hover:border-primary hover:shadow-2xl transition-all flex flex-col items-center text-center">

                            <div :class="'w-16 h-16 bg-' + service.color + '-50 text-' + service.color + '-600 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-primary group-hover:text-white transition-all transform group-hover:rotate-6'">
                                <i :data-lucide="service.icon" class="w-8 h-8"></i>
                            </div>

                            <h3 class="text-xl font-bold text-slate-900 mb-2"
                                x-text="service.title"></h3>

                            <p class="text-slate-500 text-sm"
                                x-text="service.desc"></p>

                            <span class="mt-6 flex items-center text-primary font-bold text-sm">
                                Buka Layanan
                                <i data-lucide="arrow-right" class="ml-2 w-4 h-4"></i>
                            </span>
                        </a>
                    </template>

                    <!-- EMPTY STATE -->
                    <div x-show="filteredServices.length === 0"
                        class="col-span-2 text-center text-slate-500 py-10">
                        Tidak ada layanan ditemukan.
                    </div>

                </div>
            </main>

        </div>
    </div>
</section>

<!-- INIT ICON -->
<script>
    document.addEventListener("alpine:init", () => {
        setTimeout(() => {
            if (window.lucide) lucide.createIcons();
        }, 100);
    });
</script>

{% endblock %}

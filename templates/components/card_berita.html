{% macro card_berita(item) %}
<article class="bg-white rounded-2xl shadow-card overflow-hidden hover:shadow-lg hover:-translate-y-1 transition-all duration-300 flex flex-col">
  <!-- Thumbnail -->
  <div class="relative h-48 bg-gray-100 overflow-hidden">
    {% if item.thumbnail %}
      <img src="{{ item.thumbnail }}" alt="{{ item.judul }}"
           class="w-full h-full object-cover" loading="lazy"
           onerror="this.src='{{ url_for('static', filename='images/placeholder.svg') }}'"/>
    {% else %}
      <div class="w-full h-full flex items-center justify-center bg-gradient-to-br from-primary-50 to-primary-100">
        <i data-lucide="newspaper" class="w-12 h-12 text-primary-300"></i>
      </div>
    {% endif %}
    {% if item.kategori %}
      <span class="absolute top-3 left-3 px-2.5 py-1 bg-primary text-white text-xs font-semibold rounded-full capitalize">
        {{ item.kategori }}
      </span>
    {% endif %}
  </div>
  <!-- Body -->
  <div class="p-5 flex flex-col flex-1">
    <h3 class="font-heading font-semibold text-gray-900 text-base leading-snug mb-2 line-clamp-2">
      {{ item.judul }}
    </h3>
    {% if item.created_at %}
      <div class="flex items-center gap-1.5 text-xs text-gray-400 mb-3">
        <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
        <time>{{ item.created_at[:10] if item.created_at else '' }}</time>
      </div>
    {% endif %}
    <div class="mt-auto pt-3 border-t border-gray-100">
      <a href="{{ url_for('public.berita_detail', slug=item.slug) }}"
         class="inline-flex items-center gap-1.5 text-sm font-medium text-primary hover:text-primary-700 transition group">
        Baca Selengkapnya
        <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
      </a>
    </div>
  </div>
</article>
{% endmacro %}

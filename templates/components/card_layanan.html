{% macro card_layanan(item, icon='layout-grid') %}
<div class="bg-white rounded-2xl shadow-card p-6 hover:shadow-lg hover:-translate-y-1 transition-all duration-300 flex flex-col group">
  <div class="w-12 h-12 rounded-xl bg-primary-50 flex items-center justify-center mb-4 group-hover:bg-primary-600 transition-colors">
    <i data-lucide="{{ item.icon or icon }}" class="w-6 h-6 text-primary group-hover:text-white transition-colors"></i>
  </div>
  <h3 class="font-heading font-semibold text-gray-900 text-base mb-2">{{ item.nama }}</h3>
  {% if item.deskripsi %}
    <p class="text-sm text-gray-500 leading-relaxed flex-1 line-clamp-3">{{ item.deskripsi }}</p>
  {% endif %}
  {% if item.link_url %}
    <div class="mt-4 pt-3 border-t border-gray-100">
      <a href="{{ item.link_url }}"
         class="inline-flex items-center gap-1.5 text-sm font-medium text-primary hover:text-primary-700 group/link">
        Selengkapnya
        <i data-lucide="arrow-right" class="w-4 h-4 group-hover/link:translate-x-1 transition-transform"></i>
      </a>
    </div>
  {% endif %}
</div>
{% endmacro %}

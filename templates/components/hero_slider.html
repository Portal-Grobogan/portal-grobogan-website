{% if hero_slides %}
<section x-data="{
  current: 0,
  slides: {{ hero_slides | tojson }},
  autoplayInterval: null,
  startAutoplay() {
    this.autoplayInterval = setInterval(() => { this.next(); }, 5000);
  },
  stopAutoplay() {
    clearInterval(this.autoplayInterval);
  },
  next() {
    this.current = (this.current + 1) % this.slides.length;
  },
  prev() {
    this.current = (this.current - 1 + this.slides.length) % this.slides.length;
  },
  goto(i) {
    this.current = i;
  }
}" x-init="startAutoplay()" class="relative overflow-hidden"
  style="height: 70vh; min-height: 400px; max-height: 700px;">

  <!-- Slides -->
  <template x-for="(slide, index) in slides" :key="index">
    <div x-show="current === index" x-transition:enter="transition-opacity duration-700"
      x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
      x-transition:leave="transition-opacity duration-700" x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0" class="absolute inset-0"
      :style="`background-image: url('${slide.image_url}'); background-size: cover; background-position: center;`">
      <!-- Overlay -->
      <div class="absolute inset-0 bg-gradient-to-r from-black/70 via-black/40 to-transparent"></div>
      <!-- Content -->
      <div class="relative h-full flex items-center">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
          <div class="max-w-2xl">
            <h1
              class="font-heading font-bold text-white text-3xl sm:text-4xl lg:text-5xl leading-tight mb-4 drop-shadow-lg"
              x-text="slide.judul"></h1>
            <p class="text-white/85 text-base sm:text-lg mb-6 leading-relaxed" x-text="slide.deskripsi"></p>
            <template x-if="slide.link_url">
              <a :href="slide.link_url"
                class="inline-flex items-center gap-2 px-6 py-3 bg-accent text-white font-semibold rounded-xl hover:bg-accent-500 transition shadow-lg">
                Selengkapnya <i data-lucide="arrow-right" class="w-4 h-4"></i>
              </a>
            </template>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- Prev / Next -->
  <button @click="prev(); stopAutoplay(); startAutoplay();"
    class="absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-white/20 hover:bg-white/40 backdrop-blur-sm flex items-center justify-center text-white transition z-10">
    <i data-lucide="chevron-left" class="w-5 h-5"></i>
  </button>
  <button @click="next(); stopAutoplay(); startAutoplay();"
    class="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-white/20 hover:bg-white/40 backdrop-blur-sm flex items-center justify-center text-white transition z-10">
    <i data-lucide="chevron-right" class="w-5 h-5"></i>
  </button>

  <!-- Dots -->
  <div class="absolute bottom-5 left-1/2 -translate-x-1/2 flex gap-2 z-10">
    <template x-for="(slide, index) in slides" :key="index">
      <button @click="goto(index); stopAutoplay(); startAutoplay();"
        :class="current === index ? 'w-6 bg-accent' : 'w-2 bg-white/60'"
        class="h-2 rounded-full transition-all duration-300"></button>
    </template>
  </div>
</section>
{% else %}
<!-- Default hero when no slides configured -->
<section class="relative overflow-hidden bg-gradient-to-br from-primary-700 via-primary-600 to-primary-500"
  style="height: 70vh; min-height: 400px; max-height: 700px;">
  <!-- <div class="absolute inset-0 opacity-10"
    style="background-image: url_for('static', filename='images/kepala.png') ; background-size: 60px 60px;"></div> -->
     <img src="{{ url_for('static', filename='images/kepala.webp') }}"
               alt="{{ nama }}"
               class="group-hover:scale-105 transition-transform duration-500 absolute top-0 right-0 w-1/2 max-xl:hidden"
               loading="lazy" />
  <div class="relative h-full flex items-center">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
      <div class="max-w-2xl">
        <span
          class="inline-block px-3 py-1 bg-accent/20 text-accent-300 text-xs font-semibold rounded-full mb-4 border border-accent/30">
          Portal Resmi Pemerintah
        </span>
        <h1 class="font-heading font-extrabold text-white text-4xl sm:text-5xl lg:text-6xl leading-tight mb-4">
          Kabupaten<br><span class="text-accent">Grobogan</span>
        </h1>
        <p class="text-white/80 text-lg mb-8 leading-relaxed w-2/3">
          Portal Informasi &amp; Layanan Pemerintah Kabupaten Grobogan untuk masyarakat yang lebih maju dan sejahtera.
        </p>
        <div class="flex flex-wrap gap-3">
          <a href="{{ url_for('public.layanan') }}"
            class="inline-flex items-center gap-2 px-6 py-3 bg-accent text-white font-semibold rounded-xl hover:bg-accent-500 transition shadow-lg">
            Lihat Layanan <i data-lucide="arrow-right" class="w-4 h-4"></i>
          </a>
          <a href="{{ url_for('public.pengaduan') }}"
            class="inline-flex items-center gap-2 px-6 py-3 bg-white/15 text-white font-semibold rounded-xl hover:bg-white/25 transition border border-white/30">
            Buat Pengaduan
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
{% endif %}

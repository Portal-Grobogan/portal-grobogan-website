<nav x-data="{
       open: false,
       scrolled: false,
       layananOpen: false,
       init() {
         window.addEventListener('scroll', () => { this.scrolled = window.scrollY > 10; });
       }
     }"
     :class="scrolled ? 'shadow-md bg-white' : 'bg-white'"
     class="fixed top-0 inset-x-0 z-40 transition-all duration-300">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <a href="{{ url_for('public.index') }}" class="flex items-center gap-3 group">
        <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center shadow-sm group-hover:shadow-md transition">
          <i data-lucide="shield-check" class="w-5 h-5 text-white"></i>
        </div>
        <div class="leading-tight">
          <div class="font-heading font-bold text-primary text-sm leading-none">Kabupaten</div>
          <div class="font-heading font-extrabold text-primary-600 text-base leading-none">Grobogan</div>
        </div>
      </a>

      <!-- Desktop Nav -->
      <div class="hidden md:flex items-center gap-1">
        <a href="{{ url_for('public.index') }}"
           class="px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:text-primary hover:bg-primary-50 transition">
          Beranda
        </a>
        <a href="{{ url_for('public.profil') }}"
           class="px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:text-primary hover:bg-primary-50 transition">
          Profil
        </a>

        <!-- Layanan Dropdown -->
        <div class="relative" @mouseenter="layananOpen=true" @mouseleave="layananOpen=false">
          <button class="flex items-center gap-1 px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:text-primary hover:bg-primary-50 transition">
            Layanan <i data-lucide="chevron-down" class="w-3.5 h-3.5" :class="layananOpen && 'rotate-180'" style="transition: transform .2s"></i>
          </button>
          <div x-show="layananOpen" x-transition
               class="absolute top-full left-0 mt-1 w-52 bg-white rounded-xl shadow-xl border border-gray-100 py-1 z-50">
            <a href="{{ url_for('public.layanan') }}"
               class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-primary-50 hover:text-primary">
              <i data-lucide="layout-grid" class="w-4 h-4"></i> Semua Layanan
            </a>
            <a href="{{ url_for('public.layanan_kependudukan') }}"
               class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-primary-50 hover:text-primary">
              <i data-lucide="id-card" class="w-4 h-4"></i> Kependudukan
            </a>
            <a href="{{ url_for('public.layanan_kesehatan') }}"
               class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-primary-50 hover:text-primary">
              <i data-lucide="heart-pulse" class="w-4 h-4"></i> Kesehatan
            </a>
            <a href="{{ url_for('public.layanan_kebencanaan') }}"
               class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-primary-50 hover:text-primary">
              <i data-lucide="alert-triangle" class="w-4 h-4"></i> Kebencanaan
            </a>
            <a href="{{ url_for('public.layanan_pariwisata') }}"
               class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-primary-50 hover:text-primary">
              <i data-lucide="map-pin" class="w-4 h-4"></i> Pariwisata
            </a>
          </div>
        </div>

        <a href="{{ url_for('public.berita') }}"
           class="px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:text-primary hover:bg-primary-50 transition">
          Berita
        </a>
        <a href="{{ url_for('public.pengaduan') }}"
           class="ml-2 px-4 py-2 rounded-lg text-sm font-semibold bg-primary text-white hover:bg-primary-700 transition shadow-sm">
          Pengaduan
        </a>
      </div>

      <!-- Mobile toggle -->
      <button @click="open=!open" class="md:hidden p-2 rounded-lg text-gray-600 hover:bg-gray-100">
        <i data-lucide="menu" x-show="!open" class="w-5 h-5"></i>
        <i data-lucide="x" x-show="open" class="w-5 h-5"></i>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div x-show="open" x-transition class="md:hidden bg-white border-t border-gray-100 px-4 py-3 space-y-1">
    <a href="{{ url_for('public.index') }}" class="block px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-primary-50 hover:text-primary">Beranda</a>
    <a href="{{ url_for('public.profil') }}" class="block px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-primary-50 hover:text-primary">Profil</a>
    <a href="{{ url_for('public.layanan') }}" class="block px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-primary-50 hover:text-primary">Layanan</a>
    <a href="{{ url_for('public.layanan_kependudukan') }}" class="block px-3 py-2 pl-6 rounded-lg text-xs text-gray-600 hover:bg-primary-50 hover:text-primary">↳ Kependudukan</a>
    <a href="{{ url_for('public.layanan_kesehatan') }}" class="block px-3 py-2 pl-6 rounded-lg text-xs text-gray-600 hover:bg-primary-50 hover:text-primary">↳ Kesehatan</a>
    <a href="{{ url_for('public.layanan_kebencanaan') }}" class="block px-3 py-2 pl-6 rounded-lg text-xs text-gray-600 hover:bg-primary-50 hover:text-primary">↳ Kebencanaan</a>
    <a href="{{ url_for('public.layanan_pariwisata') }}" class="block px-3 py-2 pl-6 rounded-lg text-xs text-gray-600 hover:bg-primary-50 hover:text-primary">↳ Pariwisata</a>
    <a href="{{ url_for('public.berita') }}" class="block px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-primary-50 hover:text-primary">Berita</a>
    <a href="{{ url_for('public.pengaduan') }}" class="block px-3 py-2 rounded-lg text-sm font-semibold text-primary bg-primary-50">Pengaduan</a>
  </div>
</nav>
<div class="h-16"></div>

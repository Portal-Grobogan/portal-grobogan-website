{% extends "base.html" %}
{% block title %}404 – Halaman Tidak Ditemukan{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
  <div class="text-center max-w-md">
    <div class="w-24 h-24 rounded-3xl bg-primary-50 flex items-center justify-center mx-auto mb-6">
      <i data-lucide="file-question" class="w-12 h-12 text-primary-400"></i>
    </div>
    <h1 class="font-heading font-extrabold text-8xl text-primary-100 mb-0">404</h1>
    <h2 class="font-heading font-bold text-2xl text-gray-900 mb-3">Halaman Tidak Ditemukan</h2>
    <p class="text-gray-500 mb-8">
      Halaman yang Anda cari tidak ada atau telah dipindahkan. Silakan kembali ke beranda.
    </p>
    <div class="flex flex-wrap justify-center gap-3">
      <a href="{{ url_for('public.index') }}"
         class="inline-flex items-center gap-2 px-6 py-3 bg-primary text-white font-semibold rounded-xl hover:bg-primary-700 transition">
        <i data-lucide="home" class="w-4 h-4"></i> Kembali ke Beranda
      </a>
      <a href="{{ url_for('public.pengaduan') }}"
         class="inline-flex items-center gap-2 px-6 py-3 border-2 border-primary text-primary font-semibold rounded-xl hover:bg-primary hover:text-white transition">
        Laporkan Masalah
      </a>
    </div>
  </div>
</div>
{% endblock %}
